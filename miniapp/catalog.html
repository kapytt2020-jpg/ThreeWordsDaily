<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ThreeWordsDaily — 40 Companion Catalog</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d11;--card:#1a1a24;--card2:#20202e;--border:rgba(255,255,255,0.07);
  --text:#f0f0ff;--text2:#888;--text3:#555;
  --mystic:#8b6ef5;--comedy:#f5a030;--scifi:#5ee7b0;--fantasy:#ff6060;
  --travel:#40c8f0;--retro:#f040c0;--hist:#c8a060;--nature:#80d080;
  --gold:#f5c842;--green:#5ee7b0;--red:#ff5e7a;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding-bottom:100px}

/* HEADER */
.cat-header{padding:20px 16px 16px;text-align:center;border-bottom:1px solid var(--border)}
.cat-logo{font-size:15px;font-weight:800;color:var(--text2);letter-spacing:0.1em;margin-bottom:6px}
.cat-title{font-size:24px;font-weight:900;margin-bottom:4px}
.cat-title span{color:var(--mystic)}
.cat-sub{font-size:13px;color:var(--text2);margin-bottom:12px}
.cat-stats{display:flex;justify-content:center;gap:20px}
.stat{text-align:center}
.stat-n{font-size:22px;font-weight:900;color:var(--gold)}
.stat-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em}

/* SERIES TABS */
.series-tabs{padding:12px 16px;overflow-x:auto;display:flex;gap:8px;border-bottom:1px solid var(--border);scrollbar-width:none}
.series-tabs::-webkit-scrollbar{display:none}
.stab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.18s;flex-shrink:0}
.stab.active{color:var(--text);border-color:var(--tab-color,var(--mystic));background:rgba(139,110,245,0.1)}
.stab[data-s="all"].active{border-color:var(--text2);background:rgba(255,255,255,0.05);color:var(--text)}
.stab[data-s="mystic"].active{border-color:var(--mystic);background:rgba(139,110,245,0.1);color:var(--mystic)}
.stab[data-s="comedy"].active{border-color:var(--comedy);background:rgba(245,160,48,0.1);color:var(--comedy)}
.stab[data-s="scifi"].active{border-color:var(--scifi);background:rgba(94,231,176,0.1);color:var(--scifi)}
.stab[data-s="fantasy"].active{border-color:var(--fantasy);background:rgba(255,96,96,0.1);color:var(--fantasy)}
.stab[data-s="travel"].active{border-color:var(--travel);background:rgba(64,200,240,0.1);color:var(--travel)}
.stab[data-s="retro"].active{border-color:var(--retro);background:rgba(240,64,192,0.1);color:var(--retro)}
.stab[data-s="hist"].active{border-color:var(--hist);background:rgba(200,160,96,0.1);color:var(--hist)}
.stab[data-s="nature"].active{border-color:var(--nature);background:rgba(128,208,128,0.1);color:var(--nature)}

/* GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 12px}
.comp-card{background:var(--card);border-radius:18px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.18s}
.comp-card:active{transform:scale(0.97)}
.comp-card.selected{border-color:var(--series-c,var(--mystic));box-shadow:0 0 20px -4px var(--series-c,var(--mystic))}
.comp-card-top{padding:14px 12px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
.series-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:0.06em}
.feat-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;background:var(--gold);color:#000}
.comp-art-wrap{width:72px;height:72px;position:relative;flex-shrink:0}
.comp-name{font-size:14px;font-weight:900;text-align:center}
.comp-mood{font-size:10px;color:var(--text2);text-align:center;line-height:1.4}
.comp-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:0 8px 10px}
.ctag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,0.06);color:var(--text2)}

/* EXPANDED DETAIL */
.comp-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.comp-card.open .comp-detail{display:block}
.detail-row{display:flex;gap:8px;margin-top:8px;align-items:flex-start}
.detail-key{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;width:68px;flex-shrink:0;padding-top:1px}
.detail-val{font-size:12px;color:var(--text2);flex:1;line-height:1.5}
.detail-val b{color:var(--text)}

/* === CSS ART: LUMIX (Mystic) === */
.art-lumix{position:relative;width:72px;height:72px}
.lx-aura{position:absolute;width:64px;height:64px;left:4px;top:4px;border-radius:50%;background:radial-gradient(circle,rgba(139,110,245,0.35),transparent 70%);animation:aBreath 2.8s ease-in-out infinite}
.lx-body{position:absolute;width:50px;height:50px;left:11px;top:11px;border-radius:50%;background:radial-gradient(circle at 35% 32%,#c0b0ff,#5a47e8 55%,#2d1fa0);animation:lxFloat 3.2s ease-in-out infinite}
.lx-eye{position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:40%}
.lx-eye.l{left:24%}.lx-eye.r{right:24%}
.lx-pupil{position:absolute;width:5px;height:5px;background:#2d1fa0;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.lx-wisp{position:absolute;width:7px;height:7px;border-radius:50%;background:rgba(192,176,255,0.75);top:50%;left:50%;margin:-3.5px;animation:wOrbit 3s linear infinite}
.lx-wisp:nth-child(5){animation-delay:-1s}.lx-wisp:nth-child(6){animation-delay:-2s}
.lx-spark{position:absolute;font-size:8px;color:#a89cff;animation:spFloat 2.5s ease-in-out infinite}
@keyframes lxFloat{0%,100%{transform:translateY(-4px) scale(1)}50%{transform:translateY(4px) scale(1.03)}}
@keyframes aBreath{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.14)}}
@keyframes wOrbit{from{transform:rotate(0deg) translateX(30px) rotate(0deg)}to{transform:rotate(360deg) translateX(30px) rotate(-360deg)}}
@keyframes spFloat{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}

/* === CSS ART: BLOP (Comedy) === */
.art-blop{position:relative;width:72px;height:72px}
.bl-body{position:absolute;width:56px;height:52px;left:8px;top:10px;border-radius:50% 52% 48% 50%;background:radial-gradient(circle at 38% 32%,#ffdd80,#f5a030 50%,#c07000);animation:bWobble 1.6s ease-in-out infinite}
.bl-el{position:absolute;width:16px;height:18px;background:#fff;border-radius:50%;top:28%;left:18%}
.bl-er{position:absolute;width:13px;height:15px;background:#fff;border-radius:50%;top:31%;right:20%;transform:rotate(12deg)}
.bl-pl{position:absolute;width:8px;height:9px;background:#3a2000;border-radius:50%;top:31%;left:22%}
.bl-pr{position:absolute;width:7px;height:8px;background:#3a2000;border-radius:50%;top:34%;right:23%}
.bl-mouth{position:absolute;width:22px;height:10px;border-bottom:3px solid #8a4000;border-radius:0 0 12px 12px;bottom:26%;left:50%;transform:translateX(-50%)}
.bl-ck{position:absolute;width:11px;height:7px;background:rgba(255,120,100,.38);border-radius:50%;bottom:34%}
.bl-ck.l{left:16%}.bl-ck.r{right:16%}
@keyframes bWobble{0%,100%{transform:scaleX(1) scaleY(1) rotate(-2deg)}35%{transform:scaleX(1.1) scaleY(.93) rotate(1deg)}68%{transform:scaleX(.94) scaleY(1.08) rotate(3deg)}}

/* === CSS ART: BYTE (Sci-Fi) === */
.art-byte{position:relative;width:72px;height:72px}
.by-ant{position:absolute;width:2px;height:13px;background:#5ee7b0;left:35px;top:3px}
.by-ant::after{content:'';position:absolute;width:6px;height:6px;background:#5ee7b0;border-radius:50%;top:-4px;left:-2px;animation:antBlink 1.4s ease-in-out infinite}
.by-body{position:absolute;width:46px;height:44px;left:13px;top:17px;border-radius:13px;background:linear-gradient(145deg,#182828,#0d1e1e);border:2px solid rgba(94,231,176,.4)}
.by-vis{position:absolute;width:32px;height:11px;background:linear-gradient(90deg,#40c8f0,#5ee7b0);border-radius:6px;top:24px;left:20px;animation:visBlink 2.2s ease-in-out infinite}
.by-grill{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.by-grill span{display:block;width:3px;height:7px;background:rgba(94,231,176,.35);border-radius:1px}
.by-neon{position:absolute;width:46px;height:44px;left:13px;top:17px;border-radius:13px;border:1px solid rgba(94,231,176,.15);animation:neonP 2s ease-in-out infinite}
@keyframes antBlink{0%,100%{opacity:1;box-shadow:0 0 7px #5ee7b0}50%{opacity:.25;box-shadow:none}}
@keyframes visBlink{0%,100%{opacity:.8}50%{opacity:1;box-shadow:0 0 14px rgba(64,200,240,.6)}}
@keyframes neonP{0%,100%{opacity:.35}50%{opacity:.75}}

/* === CSS ART: PYRO (Fantasy) === */
.art-pyro{position:relative;width:72px;height:72px}
.py-wl{position:absolute;width:20px;height:24px;background:linear-gradient(135deg,rgba(232,72,32,.55),transparent);border-radius:50% 0 50% 50%;top:22%;left:2%;transform:rotate(-22deg)}
.py-wr{position:absolute;width:20px;height:24px;background:linear-gradient(225deg,rgba(232,72,32,.55),transparent);border-radius:0 50% 50% 50%;top:22%;right:2%;transform:rotate(22deg)}
.py-hl{position:absolute;width:7px;height:14px;background:linear-gradient(to top,#e84820,#ffaa60);border-radius:50% 50% 0 0;top:7%;left:28%;transform:rotate(-14deg)}
.py-hr{position:absolute;width:7px;height:14px;background:linear-gradient(to top,#e84820,#ffaa60);border-radius:50% 50% 0 0;top:7%;right:28%;transform:rotate(14deg)}
.py-body{position:absolute;width:44px;height:40px;left:14px;top:20px;border-radius:50% 50% 42% 42%;background:radial-gradient(circle at 40% 34%,#ffaa60,#e84820 52%,#8a1800);box-shadow:0 0 22px rgba(232,72,32,.48)}
.py-el{position:absolute;width:11px;height:11px;background:#ffe080;border-radius:50%;top:28px;left:18px}
.py-er{position:absolute;width:11px;height:11px;background:#ffe080;border-radius:50%;top:28px;left:43px}
.py-fl{position:absolute;font-size:13px;bottom:6px;left:52px;animation:flDance .75s ease-in-out infinite alternate}
@keyframes flDance{from{transform:scale(1) rotate(-6deg)}to{transform:scale(1.25) rotate(6deg)}}

/* === CSS ART: JET (Travel) === */
.art-jet{position:relative;width:72px;height:72px}
.jt-body{position:absolute;width:46px;height:46px;left:13px;top:13px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#ffe0b0,#d08040 54%,#804010)}
.jt-gl{position:absolute;width:15px;height:13px;background:rgba(64,200,240,.7);border-radius:50%;border:2px solid #fff;top:24px;left:16px}
.jt-gr{position:absolute;width:15px;height:13px;background:rgba(64,200,240,.7);border-radius:50%;border:2px solid #fff;top:24px;left:41px}
.jt-br{position:absolute;width:7px;height:3px;background:#fff;top:30px;left:33px}
.jt-sc{position:absolute;width:32px;height:8px;background:linear-gradient(90deg,#ff5e7a,#ff8040);border-radius:4px;bottom:16px;left:50%;transform:translateX(-50%)}
.jt-pr{position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:12px;animation:prSpin .45s linear infinite}
.jt-tr{position:absolute;font-size:10px;bottom:6px;left:50%;transform:translateX(-50%);animation:trFade 2.2s ease-in-out infinite}
@keyframes prSpin{from{transform:translateX(-50%) rotate(0)}to{transform:translateX(-50%) rotate(360deg)}}
@keyframes trFade{0%,100%{opacity:.2}50%{opacity:.9}}

/* === CSS ART: GLAM (Retro Pop) === */
.art-glam{position:relative;width:72px;height:72px}
.gl-body{position:absolute;width:48px;height:48px;left:12px;top:12px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#ffb0e0,#d040a0 55%,#800060);box-shadow:0 0 20px rgba(240,64,192,.5)}
.gl-eye{position:absolute;width:12px;height:8px;background:#fff;border-radius:50%;top:36%}
.gl-eye.l{left:22%}.gl-eye.r{right:22%}
.gl-lash{position:absolute;font-size:9px;top:30%}
.gl-lash.l{left:19%}.gl-lash.r{right:17%}
.gl-mouth{position:absolute;width:18px;height:8px;border-bottom:3px solid #ff40a0;border-radius:0 0 9px 9px;bottom:28%;left:50%;transform:translateX(-50%)}
.gl-spark{position:absolute;font-size:10px;animation:gSparkle 1.5s ease-in-out infinite}
.gl-spark:nth-child(6){top:5%;left:15%;animation-delay:0s}
.gl-spark:nth-child(7){top:8%;right:10%;animation-delay:.5s}
.gl-spark:nth-child(8){bottom:10%;left:8%;animation-delay:1s}
.gl-crown{position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:14px;animation:crFloat 2s ease-in-out infinite}
@keyframes gSparkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}
@keyframes crFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

/* === CSS ART: SCROLL (Historical) === */
.art-scroll{position:relative;width:72px;height:72px}
.sc-parch{position:absolute;width:50px;height:52px;left:11px;top:10px;border-radius:6px 6px 6px 6px;background:linear-gradient(160deg,#f5e8c0,#d4b870 40%,#c0a040);border:1px solid rgba(160,120,40,.4)}
.sc-roll-t{position:absolute;width:56px;height:12px;left:8px;top:8px;border-radius:6px;background:linear-gradient(180deg,#e0c870,#c0a040)}
.sc-roll-b{position:absolute;width:56px;height:12px;left:8px;bottom:8px;border-radius:6px;background:linear-gradient(0deg,#e0c870,#c0a040)}
.sc-eye{position:absolute;width:8px;height:6px;background:#5a3a10;border-radius:50%;top:30px}
.sc-eye.l{left:22px}.sc-eye.r{right:22px}
.sc-mouth{position:absolute;width:14px;height:6px;border-bottom:2px solid #5a3a10;border-radius:0 0 6px 6px;top:44px;left:50%;transform:translateX(-50%)}
.sc-ink{position:absolute;font-size:8px;color:rgba(90,58,16,.4)}
.sc-ink.a{top:24px;left:14px}.sc-ink.b{bottom:24px;right:14px;animation-delay:.8s}
@keyframes inkFade{0%,100%{opacity:.2}50%{opacity:.7}}

/* === CSS ART: LUNA (Nature/Dream) === */
.art-luna{position:relative;width:72px;height:72px}
.ln-glow{position:absolute;width:60px;height:60px;left:6px;top:6px;border-radius:50%;background:radial-gradient(circle,rgba(160,140,220,.3),transparent 70%);animation:lunaGlow 3s ease-in-out infinite}
.ln-body{position:absolute;width:46px;height:46px;left:13px;top:13px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#e0d8f8,#a080c0 55%,#5040a0)}
.ln-cres{position:absolute;width:46px;height:46px;left:13px;top:13px;border-radius:50%;background:radial-gradient(circle at 62% 32%,var(--bg) 36%,transparent 37%)}
.ln-star-a{position:absolute;font-size:8px;color:#e0d0ff}
.ln-star-a.a{top:8px;left:22px;animation:sShin 2s ease-in-out infinite}
.ln-star-a.b{top:14px;right:12px;animation:sShin 2.5s ease-in-out infinite .7s}
.ln-star-a.c{bottom:14px;left:14px;animation:sShin 3s ease-in-out infinite 1.3s}
.ln-eye{position:absolute;width:8px;height:2px;background:#fff;border-radius:2px;top:36px}
.ln-eye.l{left:22px}.ln-eye.r{right:22px}
@keyframes lunaGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.12)}}
@keyframes sShin{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* === SIMPLE COMPANION ART === */
.art-simple{position:relative;width:72px;height:72px;display:flex;align-items:center;justify-content:center}
.sim-body{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;animation:simFloat 3s ease-in-out infinite}
.sim-eyes{display:flex;gap:7px;margin-bottom:4px;position:absolute;top:32%}
.sim-eye{width:9px;height:9px;background:#fff;border-radius:50%}
.sim-eye.slit{height:4px;border-radius:2px}
.sim-eye.glow{box-shadow:0 0 6px currentColor;background:currentColor}
.sim-mouth{position:absolute;bottom:25%;width:14px;height:7px;border-bottom:2px solid rgba(0,0,0,.4);border-radius:0 0 7px 7px;left:50%;transform:translateX(-50%)}
.sim-accent{position:absolute}
@keyframes simFloat{0%,100%{transform:translateY(-3px)}50%{transform:translateY(3px)}}

/* DETAIL PANEL */
.detail-section-head{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:12px 0 6px;padding-top:8px;border-top:1px solid var(--border)}

/* APPROVE */
.approve-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px 16px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:10px;z-index:100;max-width:420px;margin:0 auto}
.btn-approve{flex:1;padding:14px;border-radius:14px;border:none;background:linear-gradient(90deg,#5ee7b0,#40c8f0);color:#000;font-size:15px;font-weight:900;cursor:pointer;transition:all .18s}
.btn-approve:active{transform:scale(.97)}
.btn-notes{padding:14px 16px;border-radius:14px;border:2px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}

/* SELECTED COUNTER */
.sel-counter{position:fixed;top:0;left:0;right:0;z-index:99;background:rgba(94,231,176,.1);border-bottom:1px solid rgba(94,231,176,.3);padding:6px 16px;text-align:center;font-size:12px;font-weight:800;color:var(--green);display:none;max-width:420px;margin:0 auto}

/* MISC */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}
</style>
</head>
<body>

<div style="max-width:420px;margin:0 auto;position:relative">

<div class="cat-header">
  <div class="cat-logo">THREEWORDSDAILY</div>
  <div class="cat-title">Companion <span>Catalog</span></div>
  <div class="cat-sub">40 characters · 8 series · choose your companion world</div>
  <div class="cat-stats">
    <div class="stat"><div class="stat-n">40</div><div class="stat-l">Companions</div></div>
    <div class="stat"><div class="stat-n">8</div><div class="stat-l">Series</div></div>
    <div class="stat"><div class="stat-n" id="selCount">0</div><div class="stat-l">Selected</div></div>
  </div>
</div>

<div class="series-tabs" id="seriesTabs">
  <div class="stab active" data-s="all" onclick="filterSeries('all',this)">All 40</div>
  <div class="stab" data-s="mystic" onclick="filterSeries('mystic',this)">✨ Mystic</div>
  <div class="stab" data-s="comedy" onclick="filterSeries('comedy',this)">😂 Comedy</div>
  <div class="stab" data-s="scifi" onclick="filterSeries('scifi',this)">🤖 Sci-Fi</div>
  <div class="stab" data-s="fantasy" onclick="filterSeries('fantasy',this)">🐉 Fantasy</div>
  <div class="stab" data-s="travel" onclick="filterSeries('travel',this)">✈️ Travel</div>
  <div class="stab" data-s="retro" onclick="filterSeries('retro',this)">🎤 Retro Pop</div>
  <div class="stab" data-s="hist" onclick="filterSeries('hist',this)">📜 Historical</div>
  <div class="stab" data-s="nature" onclick="filterSeries('nature',this)">🌙 Nature</div>
</div>

<div class="sel-counter" id="selCounter"></div>

<div class="cat-grid" id="catGrid"></div>

<div class="approve-bar">
  <button class="btn-notes" onclick="showNotes()">💬 Notes</button>
  <button class="btn-approve" onclick="doApprove()">✅ Approve Selection</button>
</div>

</div>

<script>
// ===== COMPANION DATA =====
const SERIES_COLORS = {
  mystic:'#8b6ef5', comedy:'#f5a030', scifi:'#5ee7b0', fantasy:'#ff6060',
  travel:'#40c8f0', retro:'#f040c0', hist:'#c8a060', nature:'#80d080'
};
const SERIES_LABELS = {
  mystic:'✨ Mystic', comedy:'😂 Comedy', scifi:'🤖 Sci-Fi', fantasy:'🐉 Fantasy',
  travel:'✈️ Travel', retro:'🎤 Retro Pop', hist:'📜 Historical', nature:'🌙 Nature'
};

const COMPANIONS = [

// ===== MYSTIC (5) =====
{ id:'lumix', series:'mystic', name:'Lumix', feat:true,
  mood:'Wise · warm · luminous', tags:['Orbital float','Glow aura','Word orbit'],
  desc:'A gentle orb of crystallised knowledge. Orbits slowly, pulses with warmth, and quotes lesson words back to the user in a soft glow.',
  visual:'Deep purple–blue sphere with inner light gradient, two soft white eyes, trailing wisps that orbit the body.',
  anim:'Continuous slow float up–down. Wisps orbit at different speeds. Aura breathes in and out.',
  idle:'Every 6–10 s: soft aura pulse, eye blink, one wisp accelerates briefly.',
  tap:'Orbital ring burst → sparkle spray → word from recent lesson orbits and fades. On chain tap 4+: letter explosion.',
  feed:'Word chip flies to body → absorbed with a "gulp" glow → +XP float in companion color.',
  evo:'Egg → dim orb → full orb → orb with wings → crowned orb with chaos rings → final radiant form.',
  tone:'Calm, encouraging, slightly mystical. Speaks in short poetic lines.',

// ===== RENDER =====
let selected = new Set();
let currentFilter = 'all';

function simpleArt(id, series) {
  const c = SERIES_COLORS[series] || '#888';
  const shapes = {
    omen:    {r:'50%', grad:`radial-gradient(circle at 38% 35%,#4a3060,#1a0830)`, eyes:'glow', eyeC:c},
    aether:  {r:'50%', grad:`radial-gradient(circle at 38% 35%,#d0eeff,#5090d0)`, eyes:'slit'},
    solara:  {r:'50%', grad:`radial-gradient(circle at 38% 35%,#ffe080,#f5a030 50%,#d06000)`, eyes:'normal'},
    nocturne:{r:'50%', grad:`radial-gradient(circle at 38% 35%,#e0d8f8,#7060b0 50%,#3020a0)`, eyes:'slit'},
    squig:   {r:'40% 60% 55% 45%', grad:`radial-gradient(circle,#c0ff60,#60c020)`, eyes:'normal'},
    bonk:    {r:'50%', grad:`radial-gradient(circle,#ff8080,#dd2020)`, eyes:'normal'},
    dork:    {r:'50%', grad:`radial-gradient(circle at 38% 35%,#d0d8ff,#6080d0)`, eyes:'normal'},
    wobble:  {r:'30% 30% 50% 50%', grad:`radial-gradient(circle,#e0c0ff,#9040c0)`, eyes:'normal'},
    nova:    {r:'50%', grad:`radial-gradient(circle,rgba(100,230,255,.8),rgba(0,100,150,.9))`, eyes:'glow', eyeC:'#40c8f0'},
    grid:    {r:'8px', grad:`linear-gradient(135deg,#002200,#001500)`, eyes:'glow', eyeC:'#00cc00'},
    vex:     {r:'12px', grad:`radial-gradient(circle,#400028,#200018)`, eyes:'glow', eyeC:'#ff40a0'},
    pulse:   {r:'50%', grad:`radial-gradient(circle,#80c0ff,#2060e0)`, eyes:'glow', eyeC:'#80c0ff'},
    fern:    {r:'50% 50% 42% 42%', grad:`radial-gradient(circle at 38% 35%,#a0ff80,#208040)`, eyes:'normal'},
    rune:    {r:'8px', grad:`linear-gradient(135deg,#808090,#505060)`, eyes:'normal'},
    shimmer: {r:'50%', grad:`radial-gradient(circle,#ffc0e0,#e060a0)`, eyes:'normal'},
    veil:    {r:'50%', grad:`radial-gradient(circle,#302040,#100018)`, eyes:'glow', eyeC:'#c040ff'},
    marco:   {r:'50% 50% 42% 42%', grad:`radial-gradient(circle at 38% 35%,#e0c080,#a06020)`, eyes:'normal'},
    atlas:   {r:'50%', grad:`radial-gradient(circle,#80c0ff,#0060c0)`, eyes:'normal'},
    stamp:   {r:'12px', grad:`radial-gradient(circle,#ff9090,#cc2020)`, eyes:'normal'},
    compass: {r:'50%', grad:`linear-gradient(135deg,#d0a060,#805020)`, eyes:'normal'},
    riff:    {r:'14px', grad:`radial-gradient(circle,#ff6060,#880000)`, eyes:'normal'},
    neon:    {r:'50%', grad:`linear-gradient(135deg,#a040e0,#2080e0)`, eyes:'glow', eyeC:'#80e0ff'},
    pixel:   {r:'4px', grad:`linear-gradient(135deg,#80c040,#408000)`, eyes:'normal'},
    encore:  {r:'50%', grad:`radial-gradient(circle,#c04040,#601010)`, eyes:'normal'},
    codex:   {r:'8px', grad:`linear-gradient(160deg,#302010,#201008)`, eyes:'normal'},
    cipher:  {r:'50%', grad:`radial-gradient(circle,#c09040,#806010)`, eyes:'glow', eyeC:'#f0c040'},
    mosaic:  {r:'12px', grad:`conic-gradient(#e04040,#e0a040,#40e040,#4040e0,#e04040)`, eyes:'normal'},
    relic:   {r:'10px', grad:`radial-gradient(circle,#c08040,#806020)`, eyes:'glow', eyeC:'#f0a020'},
    bloom:   {r:'50% 50% 45% 45%', grad:`radial-gradient(circle at 38% 35%,#ffc0c0,#e06060)`, eyes:'normal'},
    luna_c:  {r:'50%', grad:`radial-gradient(circle at 38% 35%,#e0d8f8,#a080c0 55%,#5040a0)`, eyes:'slit'},
    drift:   {r:'60% 50% 55% 45%', grad:`radial-gradient(circle,#e8eeff,#9090c0)`, eyes:'normal'},
    petal:   {r:'50%', grad:`radial-gradient(circle,#ffb0d0,#e06080)`, eyes:'normal'},
  };
  const s = shapes[id] || {r:'50%', grad:`radial-gradient(circle,${c}80,${c}30)`, eyes:'normal'};
  const eyeStyle = s.eyes === 'glow'
    ? `width:8px;height:8px;background:${s.eyeC||c};border-radius:50%;box-shadow:0 0 5px ${s.eyeC||c}`
    : s.eyes === 'slit'
    ? `width:10px;height:4px;background:#fff;border-radius:2px`
    : `width:9px;height:9px;background:#fff;border-radius:50%`;
  return `<div class="art-simple"><div class="sim-body" style="background:${s.grad};border-radius:${s.r}">
    <div class="sim-eyes"><div style="${eyeStyle}"></div><div style="${eyeStyle}"></div></div>
    <div class="sim-mouth"></div>
  </div></div>`;
}

function buildArt(c) {
  if (c.id === 'lumix')  return `<div class="art-lumix"><div class="lx-aura"></div><div class="lx-body"><div class="lx-eye l"><div class="lx-pupil"></div></div><div class="lx-eye r"><div class="lx-pupil"></div></div></div><div class="lx-wisp"></div><div class="lx-wisp"></div><div class="lx-wisp"></div><div class="lx-spark" style="top:8%;left:62%">✦</div><div class="lx-spark" style="top:72%;left:14%;animation-delay:.9s">✧</div></div>`;
  if (c.id === 'blop')   return `<div class="art-blop"><div class="bl-body"></div><div class="bl-el"><div class="bl-pl"></div></div><div class="bl-er"><div class="bl-pr"></div></div><div class="bl-mouth"></div><div class="bl-ck l"></div><div class="bl-ck r"></div></div>`;
  if (c.id === 'byte')   return `<div class="art-byte"><div class="by-ant"></div><div class="by-body"><div class="by-vis"></div><div class="by-grill"><span></span><span></span><span></span><span></span></div></div><div class="by-neon"></div></div>`;
  if (c.id === 'pyro')   return `<div class="art-pyro"><div class="py-wl"></div><div class="py-wr"></div><div class="py-hl"></div><div class="py-hr"></div><div class="py-body"><div class="py-el"></div><div class="py-er"></div></div><div class="py-fl">🔥</div></div>`;
  if (c.id === 'jet')    return `<div class="art-jet"><div class="jt-body"><div class="jt-gl"></div><div class="jt-gr"></div><div class="jt-br"></div></div><div class="jt-sc"></div><div class="jt-pr">🌀</div><div class="jt-tr">✈️</div></div>`;
  if (c.id === 'glam')   return `<div class="art-glam"><div class="gl-body"><div class="gl-eye l"></div><div class="gl-eye r"></div><div class="gl-mouth"></div></div><div class="gl-crown">👑</div><div class="gl-spark">✦</div><div class="gl-spark">✧</div><div class="gl-spark">✦</div></div>`;
  if (c.id === 'scroll') return `<div class="art-scroll"><div class="sc-roll-t"></div><div class="sc-parch"><div class="sc-eye l"></div><div class="sc-eye r"></div><div class="sc-mouth"></div></div><div class="sc-roll-b"></div><div class="sc-ink a">✍</div></div>`;
  if (c.id === 'mist')   return `<div class="art-luna"><div class="ln-glow"></div><div class="ln-body"></div><div class="ln-star-a a">✦</div><div class="ln-star-a b">✧</div><div class="ln-star-a c">·</div><div class="ln-eye l"></div><div class="ln-eye r"></div></div>`;
  return simpleArt(c.id, c.series);
}

function renderGrid(filter) {
  const grid = document.getElementById('catGrid');
  const list = filter === 'all' ? COMPANIONS : COMPANIONS.filter(c => c.series === filter);
  grid.innerHTML = list.map(c => {
    const col = SERIES_COLORS[c.series];
    const sel = selected.has(c.id);
    return `<div class="comp-card ${sel?'selected':''} fade-in" id="card-${c.id}" style="--series-c:${col}" onclick="toggleCard('${c.id}')">
      <div class="comp-card-top">
        <div class="series-badge" style="background:${col}22;color:${col}">${SERIES_LABELS[c.series]}</div>
        ${c.feat?'<div class="feat-badge">Featured</div>':''}
        <div class="comp-art-wrap">${buildArt(c)}</div>
        <div class="comp-name">${c.name}</div>
        <div class="comp-mood">${c.mood}</div>
      </div>
      <div class="comp-tags">${c.tags.map(t=>`<span class="ctag">${t}</span>`).join('')}</div>
      <div class="comp-detail" id="detail-${c.id}">
        <div class="detail-section-head">Character</div>
        <div class="detail-row"><div class="detail-key">Profile</div><div class="detail-val">${c.desc}</div></div>
        <div class="detail-row"><div class="detail-key">Visual</div><div class="detail-val">${c.visual}</div></div>
        <div class="detail-section-head">Motion</div>
        <div class="detail-row"><div class="detail-key">Animation</div><div class="detail-val">${c.anim}</div></div>
        <div class="detail-row"><div class="detail-key">Idle</div><div class="detail-val">${c.idle}</div></div>
        <div class="detail-row"><div class="detail-key">Tap</div><div class="detail-val">${c.tap}</div></div>
        <div class="detail-row"><div class="detail-key">Feed</div><div class="detail-val">${c.feed}</div></div>
        <div class="detail-section-head">Progression</div>
        <div class="detail-row"><div class="detail-key">Evolution</div><div class="detail-val">${c.evo}</div></div>
        <div class="detail-section-head">Personality</div>
        <div class="detail-row"><div class="detail-key">Tone</div><div class="detail-val">${c.tone}</div></div>
        <div class="detail-row"><div class="detail-key">Best for</div><div class="detail-val"><b>${c.for}</b></div></div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button onclick="event.stopPropagation();toggleSelect('${c.id}')" style="flex:1;padding:10px;border-radius:10px;border:1.5px solid ${col};background:${selected.has(c.id)?col+'33':'transparent'};color:${selected.has(c.id)?col:col};font-size:12px;font-weight:800;cursor:pointer" id="selbtn-${c.id}">
            ${selected.has(c.id)?'✓ Selected':'+ Select'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
  updateCounter();
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  const detail = document.getElementById('detail-'+id);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.comp-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) { card.classList.add('open'); detail.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  const card = document.getElementById('card-'+id);
  const col = SERIES_COLORS[COMPANIONS.find(c=>c.id===id)?.series||'mystic'];
  card.classList.toggle('selected', selected.has(id));
  const btn = document.getElementById('selbtn-'+id);
  if (btn) {
    btn.textContent = selected.has(id) ? '✓ Selected' : '+ Select';
    btn.style.background = selected.has(id) ? col+'33' : 'transparent';
  }
  updateCounter();
}

function updateCounter() {
  const n = selected.size;
  document.getElementById('selCount').textContent = n;
  const bar = document.getElementById('selCounter');
  if (n > 0) {
    bar.style.display = 'block';
    const names = [...selected].map(id => COMPANIONS.find(c=>c.id===id)?.name||'?');
    bar.textContent = n + ' selected: ' + names.slice(0,5).join(', ') + (names.length>5?'…':'');
  } else { bar.style.display = 'none'; }
}

function filterSeries(s, tab) {
  currentFilter = s;
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderGrid(s);
}

function showNotes() {
  alert('Open this file in browser and note which companions you like.\nSelect them with the + Select button.\nThen click Approve to confirm direction.');
}

function doApprove() {
  const names = [...selected].map(id => COMPANIONS.find(c=>c.id===id)?.name||'?');
  if (selected.size === 0) {
    if (!confirm('Approve ALL 40 companions and proceed?')) return;
  }
  const msg = selected.size > 0
    ? `Approved ${selected.size} companions:\n${names.join(', ')}\n\nProceed with implementation?`
    : 'Approve full 40-companion system and proceed?';
  if (confirm(msg)) {
    document.body.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0d11;color:#f0f0ff;text-align:center;padding:32px;gap:16px"><div style="font-size:64px">✅</div><div style="font-size:24px;font-weight:900;color:#5ee7b0">Catalog Approved!</div><div style="color:#888;font-size:14px;max-width:300px">' + (selected.size>0?selected.size+' companions selected for priority implementation.':'Full 40-companion system approved.') + '</div></div>';
  }
}

// Initial render
renderGrid('all');
</script>
