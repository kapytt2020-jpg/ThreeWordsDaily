<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Mochi Full — Sticker Export</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:512px;height:512px;overflow:hidden;background:transparent;}
body{background:transparent!important;}

/* ── STAGE ── */
#mochi-export{
  width:512px;height:512px;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:transparent;overflow:visible;
}

/* ── SCENE WRAPPER (scales the whole character) ── */
.mochi-scene{
  position:relative;
  transform:scale(3.9);
  transform-origin:center 62%;
  animation:sceneFloat 3.2s ease-in-out infinite;
}
@keyframes sceneFloat{
  0%,100%{transform:scale(3.9) translateY(0)}
  50%{transform:scale(3.9) translateY(-4px)}
}

/* ══ CHARACTER PARTS ══ */

/* ARMS */
.mochi-arm-l,.mochi-arm-r{
  position:absolute;width:13px;height:22px;
  background:radial-gradient(ellipse at 40% 30%,#fef9c3,#fde68a 60%,#fbbf24);
  border-radius:7px;bottom:33px;z-index:2;
  transform-origin:top center;
}
.mochi-arm-l{left:-7px;transform:rotate(-20deg);}
.mochi-arm-r{right:-7px;transform:rotate(20deg);}

/* LEGS */
.mochi-leg-l,.mochi-leg-r{
  position:absolute;width:17px;height:13px;
  background:radial-gradient(ellipse at 50%30%,#fef3c7,#fde68a 60%,#fbbf24);
  border-radius:9px;bottom:0;z-index:2;
}
.mochi-leg-l{left:9px;}
.mochi-leg-r{right:9px;}

/* BODY */
.mochi-body{
  position:absolute;width:50px;height:30px;
  background:radial-gradient(ellipse at 40% 30%,#fef3c7,#fde68a 60%,#fbbf24);
  border-radius:25px 25px 17px 17px;
  bottom:11px;left:50%;transform:translateX(-50%);z-index:3;
}

/* HEAD */
.mochi-head{
  position:absolute;width:80px;height:78px;
  background:radial-gradient(circle at 38% 30%,#fef9c3 0%,#fde68a 22%,#fbbf24 48%,#f59e0b 74%,#d97706 92%);
  border-radius:50%;bottom:28px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 20px 8px rgba(251,191,36,0.45),0 0 40px 12px rgba(217,119,6,0.2);
  z-index:4;transition:transform 0.12s;
}

/* EARS */
.mochi-ear-l,.mochi-ear-r{
  position:absolute;width:23px;height:29px;
  background:radial-gradient(ellipse at 44% 58%,#fde68a,#fbbf24 45%,#f59e0b 78%,#d97706);
  border-radius:11px 11px 7px 7px;top:-15px;z-index:5;
  transform-origin:bottom center;
}
.mochi-ear-l{left:7px;}
.mochi-ear-r{right:7px;}
.mochi-ear-inner{
  position:absolute;width:11px;height:15px;
  background:radial-gradient(ellipse at 50% 50%,#fb923c,#ea580c 65%,#c2410c);
  border-radius:6px 6px 5px 5px;top:6px;left:50%;transform:translateX(-50%);
}

/* EYES */
.mochi-eye-l,.mochi-eye-r{
  position:absolute;width:20px;height:21px;border-radius:50%;
  background:radial-gradient(ellipse at 40% 30%,#3b1a00,#1a0900 55%,#0d0400);
  top:20px;z-index:6;transition:transform 0.2s,opacity 0.2s;overflow:visible;
}
.mochi-eye-l{left:9px;}
.mochi-eye-r{right:9px;}
.mochi-eye-hl{position:absolute;width:7px;height:7px;background:#fff;border-radius:1px;top:3px;left:3px;}
.mochi-eye-hl2{position:absolute;width:3px;height:3px;background:rgba(255,255,255,0.82);border-radius:1px;bottom:4px;right:3px;}

/* BROWS */
.mochi-brow-l,.mochi-brow-r{
  position:absolute;width:18px;height:3px;background:#5c2a0a;
  border-radius:3px;top:14px;z-index:7;opacity:0;transition:opacity 0.2s;
}
.mochi-brow-l{left:9px;transform:rotate(20deg);}
.mochi-brow-r{right:9px;transform:rotate(-20deg);}

/* NOSE */
.mochi-nose{
  position:absolute;width:9px;height:5px;background:#fb7185;
  border-radius:50%;bottom:24px;left:50%;transform:translateX(-50%);z-index:6;
}

/* BLUSH */
.mochi-blush-l,.mochi-blush-r{
  position:absolute;width:17px;height:8px;
  background:rgba(251,113,133,0.25);border-radius:50%;bottom:28px;z-index:6;
  transition:opacity 0.3s,background 0.3s;
}
.mochi-blush-l{left:4px;}
.mochi-blush-r{right:4px;}

/* MOUTH */
.mochi-mouth{
  position:absolute;width:22px;height:11px;
  bottom:16px;left:50%;transform:translateX(-50%);z-index:6;
  opacity:0;transition:opacity 0.2s;
}
.mochi-mouth::before{
  content:'';position:absolute;inset:0;
  border-bottom:3px solid rgba(180,80,60,0.75);
  border-radius:0 0 50% 50%;
}

/* TEARS */
.mochi-tear-l,.mochi-tear-r{
  position:absolute;width:5px;height:11px;
  background:linear-gradient(to bottom,rgba(96,165,250,0.9),transparent);
  border-radius:50%;z-index:7;top:38px;opacity:0;
}
.mochi-tear-l{left:14px;}
.mochi-tear-r{right:14px;}

/* ══════════════════════════════════════════════
   EXPRESSION: HAPPY
   ══════════════════════════════════════════════ */
.expr-happy .mochi-scene{animation:happyScene 0.46s cubic-bezier(0.36,0.07,0.19,0.97) infinite!important;}
@keyframes happyScene{
  0%   {transform:scale(3.9) translateY(0)    scaleX(1)    scaleY(1)}
  18%  {transform:scale(3.9) translateY(-20%) scaleX(0.87) scaleY(1.16)}
  36%  {transform:scale(3.9) translateY(0)    scaleX(1.22) scaleY(0.82)}
  54%  {transform:scale(3.9) translateY(-12%) scaleX(0.91) scaleY(1.1)}
  72%  {transform:scale(3.9) translateY(0)    scaleX(1.12) scaleY(0.9)}
  100% {transform:scale(3.9) translateY(0)    scaleX(1)    scaleY(1)}
}
.expr-happy .mochi-ear-l,.expr-happy .mochi-ear-r{animation:happyEar 0.46s ease-in-out infinite!important;}
.expr-happy .mochi-ear-r{animation-delay:.08s!important;}
@keyframes happyEar{0%,100%{transform:rotate(0)}25%{transform:rotate(-22deg) scaleY(1.12)}58%{transform:rotate(15deg)}}
.expr-happy .mochi-arm-l{animation:happyArmL 0.46s ease-in-out infinite!important;}
.expr-happy .mochi-arm-r{animation:happyArmR 0.46s ease-in-out infinite!important;}
@keyframes happyArmL{0%,100%{transform:rotate(-20deg)}30%{transform:rotate(-75deg) translateY(-6px)}}
@keyframes happyArmR{0%,100%{transform:rotate(20deg)}30%{transform:rotate(75deg) translateY(-6px)}}
.expr-happy .mochi-mouth{opacity:0.85;}
.expr-happy .mochi-blush-l,.expr-happy .mochi-blush-r{opacity:1;background:rgba(251,113,133,0.55)!important;animation:blushPop .46s ease-in-out infinite;}
@keyframes blushPop{0%,100%{transform:scale(1)}40%{transform:scale(1.35)}}

/* ══════════════════════════════════════════════
   EXPRESSION: LOVE
   ══════════════════════════════════════════════ */
.expr-love .mochi-scene{animation:loveScene 1.1s ease-in-out infinite!important;}
@keyframes loveScene{
  0%,100%{transform:scale(3.9) translateY(0) rotate(-3deg)}
  25%{transform:scale(3.9) translateY(-10%) rotate(0deg) scale3d(1.06,1.06,1)}
  50%{transform:scale(3.9) translateY(-3%) rotate(3deg)}
  75%{transform:scale(3.9) translateY(-12%) rotate(0deg) scale3d(1.08,1.08,1)}
}
.expr-love .mochi-ear-l,.expr-love .mochi-ear-r{animation:loveEar 1.1s ease-in-out infinite!important;}
@keyframes loveEar{0%,100%{transform:rotate(-5deg) scaleY(0.9)}50%{transform:rotate(4deg) scaleY(0.92)}}
.expr-love .mochi-arm-l{animation:loveArmL 1.1s ease-in-out infinite!important;}
.expr-love .mochi-arm-r{animation:loveArmR 1.1s ease-in-out infinite!important;}
@keyframes loveArmL{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(35deg)}}
@keyframes loveArmR{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-35deg)}}
.expr-love .mochi-eye-l,.expr-love .mochi-eye-r{background:transparent!important;}
.expr-love .mochi-eye-l::before,.expr-love .mochi-eye-r::before{
  content:'❤';position:absolute;inset:-10%;
  display:flex;align-items:center;justify-content:center;
  font-size:220%;color:#f43f5e;
  filter:drop-shadow(0 0 5px rgba(244,63,94,0.8));
  animation:heartbeat 0.6s ease-in-out infinite;
}
.expr-love .mochi-eye-hl,.expr-love .mochi-eye-hl2{display:none;}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.expr-love .mochi-blush-l,.expr-love .mochi-blush-r{opacity:1!important;background:rgba(251,113,133,0.55)!important;}
.expr-love .mochi-head{animation:loveGlow 1.1s ease-in-out infinite;}
@keyframes loveGlow{
  0%,100%{box-shadow:0 0 20px 8px rgba(251,191,36,0.45),0 0 40px 12px rgba(217,119,6,0.2)}
  50%{box-shadow:0 0 28px 14px rgba(244,63,94,0.5),0 0 55px 20px rgba(244,63,94,0.22)}
}

/* ══════════════════════════════════════════════
   EXPRESSION: SLEEPY
   ══════════════════════════════════════════════ */
.expr-sleepy .mochi-scene{animation:sleepyScene 2.4s ease-in-out infinite!important;}
@keyframes sleepyScene{
  0%,100%{transform:scale(3.9) translateY(0) rotate(-3deg) scaleX(1.04) scaleY(0.97)}
  50%{transform:scale(3.9) translateY(6%) rotate(5deg) scaleX(1.06) scaleY(0.95)}
}
.expr-sleepy .mochi-ear-l,.expr-sleepy .mochi-ear-r{animation:sleepyEar 2.4s ease-in-out infinite!important;}
@keyframes sleepyEar{0%,100%{transform:rotate(-7deg) scaleY(0.78) scaleX(1.12)}50%{transform:rotate(9deg) scaleY(0.72) scaleX(1.18)}}
.expr-sleepy .mochi-arm-l{animation:sleepyArmL 2.4s ease-in-out infinite!important;}
.expr-sleepy .mochi-arm-r{animation:sleepyArmR 2.4s ease-in-out infinite!important;}
@keyframes sleepyArmL{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(-5deg)}}
@keyframes sleepyArmR{0%,100%{transform:rotate(20deg)}50%{transform:rotate(5deg)}}
.expr-sleepy .mochi-eye-l,.expr-sleepy .mochi-eye-r{transform:scaleY(0.15)!important;}
.expr-sleepy .mochi-eye-hl,.expr-sleepy .mochi-eye-hl2{opacity:0;}
.expr-sleepy .mochi-blush-l,.expr-sleepy .mochi-blush-r{opacity:0.6!important;}
.expr-sleepy .mochi-head::after{
  content:'z z z';position:absolute;top:-10%;right:0%;
  font-size:18%;font-weight:900;color:#a78bfa;letter-spacing:0.3em;
  animation:floatZzz 2.4s ease-in-out infinite;
}
@keyframes floatZzz{0%,100%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(-18%) scale(1.12);opacity:0.5}}

/* ══════════════════════════════════════════════
   EXPRESSION: SURPRISED
   ══════════════════════════════════════════════ */
.expr-surprised .mochi-scene{animation:surprisedScene 0.24s ease-in-out infinite!important;}
@keyframes surprisedScene{
  0%,100%{transform:scale(3.9) translateY(0) scaleX(1) scaleY(1)}
  32%{transform:scale(3.9) translateY(-8%) scaleX(0.88) scaleY(1.2)}
  65%{transform:scale(3.9) translateY(3%) scaleX(1.14) scaleY(0.86)}
  82%{transform:scale(3.9) translateY(-3%) scaleX(0.96) scaleY(1.06)}
}
.expr-surprised .mochi-ear-l,.expr-surprised .mochi-ear-r{animation:surprisedEar 0.24s ease-in-out infinite!important;}
@keyframes surprisedEar{0%,100%{transform:scaleY(1) translateY(0)}35%{transform:scaleY(1.5) translateY(-12%)}70%{transform:scaleY(0.82) translateY(5%)}}
.expr-surprised .mochi-arm-l{animation:surprisedArmL 0.24s ease-in-out infinite!important;}
.expr-surprised .mochi-arm-r{animation:surprisedArmR 0.24s ease-in-out infinite!important;}
@keyframes surprisedArmL{0%,100%{transform:rotate(-20deg)}40%{transform:rotate(-90deg) translateX(-4px)}}
@keyframes surprisedArmR{0%,100%{transform:rotate(20deg)}40%{transform:rotate(90deg) translateX(4px)}}
.expr-surprised .mochi-eye-l,.expr-surprised .mochi-eye-r{transform:scale(1.3)!important;box-shadow:0 0 0 3px rgba(255,255,255,0.2);}
.expr-surprised .mochi-mouth{opacity:1;}
.expr-surprised .mochi-mouth::before{border-bottom:none;border-radius:50%;border:3px solid rgba(180,80,60,0.7);background:rgba(120,40,20,0.2);}

/* ══════════════════════════════════════════════
   EXPRESSION: EXCITED
   ══════════════════════════════════════════════ */
.expr-excited .mochi-scene{animation:excitedScene 0.34s cubic-bezier(0.36,0.07,0.19,0.97) infinite!important;}
@keyframes excitedScene{
  0%,100%{transform:scale(3.9) translateY(0) scaleX(1) scaleY(1) rotate(0deg)}
  28%{transform:scale(3.9) translateY(-24%) scaleX(0.84) scaleY(1.2) rotate(-4deg)}
  52%{transform:scale(3.9) translateY(0) scaleX(1.26) scaleY(0.78) rotate(2deg)}
  76%{transform:scale(3.9) translateY(-14%) scaleX(0.9) scaleY(1.14) rotate(-2deg)}
}
.expr-excited .mochi-ear-l,.expr-excited .mochi-ear-r{animation:excitedEar 0.18s ease-in-out infinite alternate!important;}
.expr-excited .mochi-ear-l{animation-direction:alternate!important;}
.expr-excited .mochi-ear-r{animation-direction:alternate-reverse!important;}
@keyframes excitedEar{from{transform:rotate(-24deg) scaleY(1.12)}to{transform:rotate(24deg) scaleY(0.86)}}
.expr-excited .mochi-arm-l{animation:excitedArmL 0.34s ease-in-out infinite!important;}
.expr-excited .mochi-arm-r{animation:excitedArmR 0.34s ease-in-out infinite!important;}
@keyframes excitedArmL{0%,100%{transform:rotate(-20deg)}35%{transform:rotate(-100deg)}}
@keyframes excitedArmR{0%,100%{transform:rotate(20deg)}35%{transform:rotate(100deg)}}
.expr-excited .mochi-eye-l::after,.expr-excited .mochi-eye-r::after{
  content:'✦';position:absolute;font-size:180%;color:#fbbf24;
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:sparkSpin 0.5s linear infinite;
  filter:drop-shadow(0 0 5px rgba(251,191,36,0.9));
}
.expr-excited .mochi-eye-hl,.expr-excited .mochi-eye-hl2{opacity:0;}
.expr-excited .mochi-mouth{opacity:1;}
.expr-excited .mochi-mouth::before{border-radius:0 0 50% 50%;height:80%;}
.expr-excited .mochi-head{animation:excitedGlow 0.34s ease-in-out infinite;}
@keyframes excitedGlow{0%,100%{box-shadow:0 0 20px 8px rgba(251,191,36,0.45),0 0 40px 12px rgba(217,119,6,0.2)}50%{box-shadow:0 0 35px 18px rgba(251,191,36,0.8),0 0 70px 28px rgba(251,191,36,0.4)}}
@keyframes sparkSpin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}

/* ══════════════════════════════════════════════
   EXPRESSION: SAD
   ══════════════════════════════════════════════ */
.expr-sad .mochi-scene{animation:sadScene 1.8s ease-in-out infinite!important;}
@keyframes sadScene{
  0%,100%{transform:scale(3.9) translateY(0) rotate(0deg) scaleY(1)}
  50%{transform:scale(3.9) translateY(6%) rotate(-3deg) scaleY(0.94)}
}
.expr-sad .mochi-ear-l{animation:sadEarL 1.8s ease-in-out infinite!important;}
.expr-sad .mochi-ear-r{animation:sadEarR 1.8s ease-in-out infinite!important;}
@keyframes sadEarL{0%,100%{transform:rotate(0deg) scaleY(0.95)}50%{transform:rotate(14deg) scaleY(0.82)}}
@keyframes sadEarR{0%,100%{transform:rotate(0deg) scaleY(0.95)}50%{transform:rotate(-14deg) scaleY(0.82)}}
.expr-sad .mochi-arm-l{animation:sadArmL 1.8s ease-in-out infinite!important;}
.expr-sad .mochi-arm-r{animation:sadArmR 1.8s ease-in-out infinite!important;}
@keyframes sadArmL{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(10deg)}}
@keyframes sadArmR{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-10deg)}}
.expr-sad .mochi-eye-l{transform:rotate(8deg) scaleX(0.85)!important;}
.expr-sad .mochi-eye-r{transform:rotate(-8deg) scaleX(0.85)!important;}
.expr-sad .mochi-mouth{opacity:1;}
.expr-sad .mochi-mouth::before{transform:scaleY(-1) translateY(100%);}
.expr-sad .mochi-blush-l,.expr-sad .mochi-blush-r{opacity:0.8!important;background:rgba(251,113,133,0.3)!important;}
.expr-sad .mochi-tear-l,.expr-sad .mochi-tear-r{opacity:1;animation:tearDrop 1.2s ease-in infinite!important;}
@keyframes tearDrop{0%{opacity:0;transform:translateY(-3px)}30%{opacity:1}100%{opacity:0;transform:translateY(14px)}}

/* ══════════════════════════════════════════════
   EXPRESSION: ANGRY
   ══════════════════════════════════════════════ */
.expr-angry .mochi-scene{animation:angryScene 0.09s linear infinite!important;}
@keyframes angryScene{
  0%,100%{transform:scale(3.9) translateX(0) rotate(0deg)}
  25%{transform:scale(3.9) translateX(-3%) rotate(-1.5deg)}
  75%{transform:scale(3.9) translateX(3%) rotate(1.5deg)}
}
.expr-angry .mochi-ear-l,.expr-angry .mochi-ear-r{animation:angryEar 0.09s linear infinite!important;}
@keyframes angryEar{0%,100%{transform:scaleY(1) rotate(0)}50%{transform:scaleY(0.62) rotate(5deg)}}
.expr-angry .mochi-arm-l{animation:angryArmL 0.09s linear infinite!important;}
.expr-angry .mochi-arm-r{animation:angryArmR 0.09s linear infinite!important;}
@keyframes angryArmL{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(-30deg)}}
@keyframes angryArmR{0%,100%{transform:rotate(20deg)}50%{transform:rotate(30deg)}}
.expr-angry .mochi-brow-l,.expr-angry .mochi-brow-r{opacity:1;}
.expr-angry .mochi-eye-l,.expr-angry .mochi-eye-r{transform:scaleY(0.62) scaleX(0.88)!important;transform-origin:top center;}
.expr-angry .mochi-blush-l,.expr-angry .mochi-blush-r{opacity:1!important;background:rgba(239,68,68,0.4)!important;}
.expr-angry .mochi-head{animation:angryFlash 0.2s ease-in-out infinite;}
@keyframes angryFlash{0%,100%{box-shadow:0 0 20px 8px rgba(251,191,36,0.45),0 0 40px 12px rgba(217,119,6,0.2)}50%{box-shadow:0 0 26px 13px rgba(239,68,68,0.6),0 0 50px 18px rgba(239,68,68,0.3)}}

/* ══════════════════════════════════════════════
   EXPRESSION: WINK
   ══════════════════════════════════════════════ */
.expr-wink .mochi-scene{animation:winkScene 0.72s ease-in-out infinite!important;}
@keyframes winkScene{
  0%,100%{transform:scale(3.9) translateY(0) rotate(0deg)}
  25%{transform:scale(3.9) translateY(-13%) rotate(-10deg) scale(1.04)}
  55%{transform:scale(3.9) translateY(-5%) rotate(5deg) scale(1.02)}
  80%{transform:scale(3.9) translateY(-8%) rotate(-3deg)}
}
.expr-wink .mochi-ear-r{animation:winkEarR 0.72s ease-in-out infinite!important;}
.expr-wink .mochi-ear-l{animation:winkEarL 0.72s ease-in-out infinite!important;}
@keyframes winkEarR{0%,100%{transform:rotate(0)}30%{transform:rotate(-20deg) scaleY(1.12)}65%{transform:rotate(10deg)}}
@keyframes winkEarL{0%,100%{transform:rotate(0)}30%{transform:rotate(8deg)}65%{transform:rotate(-5deg)}}
.expr-wink .mochi-arm-r{animation:winkArmR 0.72s ease-in-out infinite!important;}
@keyframes winkArmR{0%,100%{transform:rotate(20deg)}40%{transform:rotate(-60deg) translateY(-5px)}}
.expr-wink .mochi-eye-r{transform:scaleY(0.08)!important;transform-origin:center;}
.expr-wink .mochi-eye-r .mochi-eye-hl,.expr-wink .mochi-eye-r .mochi-eye-hl2{opacity:0;}
.expr-wink .mochi-mouth{opacity:1;}
.expr-wink .mochi-blush-l,.expr-wink .mochi-blush-r{opacity:0.9!important;background:rgba(251,113,133,0.42)!important;}

/* ══════════════════════════════════════════════
   EXPRESSION: DANCE
   ══════════════════════════════════════════════ */
.expr-dance .mochi-scene{animation:danceScene 0.6s ease-in-out infinite!important;}
@keyframes danceScene{
  0%{transform:scale(3.9) translateY(0) rotate(-8deg) scaleX(0.95)}
  25%{transform:scale(3.9) translateY(-10%) rotate(0deg) scaleX(1)}
  50%{transform:scale(3.9) translateY(0) rotate(8deg) scaleX(0.95)}
  75%{transform:scale(3.9) translateY(-10%) rotate(0deg) scaleX(1)}
  100%{transform:scale(3.9) translateY(0) rotate(-8deg) scaleX(0.95)}
}
.expr-dance .mochi-ear-l{animation:danceEarL 0.6s ease-in-out infinite!important;}
.expr-dance .mochi-ear-r{animation:danceEarR 0.6s ease-in-out infinite!important;}
@keyframes danceEarL{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(6deg)}}
@keyframes danceEarR{0%,100%{transform:rotate(12deg)}50%{transform:rotate(-6deg)}}
.expr-dance .mochi-arm-l{animation:danceArmL 0.6s ease-in-out infinite!important;}
.expr-dance .mochi-arm-r{animation:danceArmR 0.6s ease-in-out infinite!important;}
@keyframes danceArmL{0%,50%{transform:rotate(-80deg)}25%,75%{transform:rotate(-10deg)}}
@keyframes danceArmR{0%,50%{transform:rotate(10deg)}25%,75%{transform:rotate(80deg)}}
.expr-dance .mochi-leg-l{animation:danceLegL 0.6s ease-in-out infinite!important;}
.expr-dance .mochi-leg-r{animation:danceLegR 0.6s ease-in-out infinite!important;}
@keyframes danceLegL{0%,100%{transform:rotate(-10deg) translateY(0)}50%{transform:rotate(10deg) translateY(-3px)}}
@keyframes danceLegR{0%,100%{transform:rotate(10deg) translateY(0)}50%{transform:rotate(-10deg) translateY(-3px)}}
.expr-dance .mochi-mouth{opacity:0.8;}
.expr-dance .mochi-blush-l,.expr-dance .mochi-blush-r{opacity:1!important;background:rgba(251,113,133,0.45)!important;}

/* ══════════════════════════════════════════════
   EXPRESSION: COOL (sunglasses)
   ══════════════════════════════════════════════ */
.expr-cool .mochi-scene{animation:coolScene 1.4s ease-in-out infinite!important;}
@keyframes coolScene{
  0%,100%{transform:scale(3.9) translateY(0) rotate(-2deg)}
  40%{transform:scale(3.9) translateY(-6%) rotate(1deg)}
  70%{transform:scale(3.9) translateY(-2%) rotate(-1deg)}
}
.expr-cool .mochi-arm-r{animation:coolArmR 1.4s ease-in-out infinite!important;}
@keyframes coolArmR{0%,100%{transform:rotate(20deg)}40%{transform:rotate(-55deg) translateY(-4px)}}
.expr-cool .mochi-eye-l,.expr-cool .mochi-eye-r{background:#1a1a2e!important;border-radius:6px!important;transform:scaleY(0.55) scaleX(1.1)!important;}
.expr-cool .mochi-eye-l::after,.expr-cool .mochi-eye-r::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.6),rgba(59,130,246,0.6));
  border-radius:inherit;
}
.expr-cool .mochi-eye-hl,.expr-cool .mochi-eye-hl2{display:none;}
.expr-cool .mochi-mouth{opacity:0.7;}
.expr-cool .mochi-ear-l,.expr-cool .mochi-ear-r{animation:coolEar 1.4s ease-in-out infinite!important;}
@keyframes coolEar{0%,100%{transform:rotate(0)}50%{transform:rotate(4deg)}}

/* ══════════════════════════════════════════════
   PARTICLES
   ══════════════════════════════════════════════ */
.particle{position:absolute;pointer-events:none;z-index:20;line-height:1;transform-origin:center;will-change:transform,opacity;}
@keyframes pFloat{0%{opacity:1;transform:translate(0,0) scale(1.2) rotate(0deg)}100%{opacity:0;transform:translate(var(--tx,0px),var(--ty,-80px)) scale(0) rotate(var(--tr,150deg))}}
@keyframes pSpin{0%{opacity:1;transform:translate(0,0) scale(1.3) rotate(0deg)}50%{opacity:1;transform:translate(calc(var(--tx,0px)*0.5),calc(var(--ty,-40px)*0.5)) scale(0.9) rotate(180deg)}100%{opacity:0;transform:translate(var(--tx,0px),var(--ty,-80px)) scale(0) rotate(360deg)}}

/* ══════════════════════════════════════════════
   UI (hidden during export)
   ══════════════════════════════════════════════ */
.topbar,.expr-row,.actions{display:flex;}
.topbar{width:100%;align-items:center;justify-content:space-between;padding:10px 14px 6px;position:absolute;top:0;z-index:50;}
.topbar-title{font-size:0.9rem;font-weight:700;background:linear-gradient(135deg,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-family:system-ui,sans-serif;}
.expr-row{gap:6px;justify-content:center;padding:6px 14px;position:absolute;bottom:52px;width:100%;flex-wrap:wrap;z-index:50;}
.expr-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent;font-family:system-ui,sans-serif;}
.expr-btn.active{border-color:#fbbf24;background:rgba(251,191,36,0.18);}
</style>
</head>
<body>
<!-- UI hidden during Playwright export via JS evaluate -->
<div class="topbar"><span class="topbar-title">🐰 Mochi Full</span></div>

<div id="mochi-export">
  <div class="mochi-scene" id="mochiScene">
    <div style="width:80px;height:120px;position:relative;" id="mochiWrap">
      <!-- ARMS -->
      <div class="mochi-arm-l"></div>
      <div class="mochi-arm-r"></div>
      <!-- LEGS -->
      <div class="mochi-leg-l"></div>
      <div class="mochi-leg-r"></div>
      <!-- BODY -->
      <div class="mochi-body"></div>
      <!-- HEAD -->
      <div class="mochi-head" id="mochiHead">
        <!-- BROWS -->
        <div class="mochi-brow-l"></div>
        <div class="mochi-brow-r"></div>
        <!-- EYES -->
        <div class="mochi-eye-l"><div class="mochi-eye-hl"></div><div class="mochi-eye-hl2"></div></div>
        <div class="mochi-eye-r"><div class="mochi-eye-hl"></div><div class="mochi-eye-hl2"></div></div>
        <!-- TEARS -->
        <div class="mochi-tear-l"></div>
        <div class="mochi-tear-r"></div>
        <!-- NOSE -->
        <div class="mochi-nose"></div>
        <!-- BLUSH -->
        <div class="mochi-blush-l"></div>
        <div class="mochi-blush-r"></div>
        <!-- MOUTH -->
        <div class="mochi-mouth"></div>
      </div>
      <!-- EARS (inside wrap, above head) -->
      <div class="mochi-ear-l" style="position:absolute;z-index:5;top:18px;left:7px;"><div class="mochi-ear-inner"></div></div>
      <div class="mochi-ear-r" style="position:absolute;z-index:5;top:18px;right:7px;"><div class="mochi-ear-inner"></div></div>
    </div>
  </div>
</div>

<div class="expr-row" id="exprRow">
  <button class="expr-btn active" data-expr="" onclick="setExpression('')">😶</button>
  <button class="expr-btn" data-expr="happy"    onclick="setExpression('happy')">😊</button>
  <button class="expr-btn" data-expr="love"     onclick="setExpression('love')">💕</button>
  <button class="expr-btn" data-expr="sleepy"   onclick="setExpression('sleepy')">😴</button>
  <button class="expr-btn" data-expr="surprised" onclick="setExpression('surprised')">😮</button>
  <button class="expr-btn" data-expr="excited"  onclick="setExpression('excited')">🌟</button>
  <button class="expr-btn" data-expr="sad"      onclick="setExpression('sad')">😢</button>
  <button class="expr-btn" data-expr="angry"    onclick="setExpression('angry')">😤</button>
  <button class="expr-btn" data-expr="wink"     onclick="setExpression('wink')">😉</button>
  <button class="expr-btn" data-expr="dance"    onclick="setExpression('dance')">💃</button>
  <button class="expr-btn" data-expr="cool"     onclick="setExpression('cool')">😎</button>
</div>

<script>
(function(){
'use strict';

var currentExpr = '';
var allExprs = ['','happy','love','sleepy','surprised','excited','sad','angry','wink','dance','cool'];

var PARTICLES = {
  happy:    {sets:[['⭐','🌟','✨'],['💫','★','✦']],    count:8,  life:800,  spread:130, anim:'pSpin'},
  love:     {sets:[['❤️','💕','💖'],['💗','🩷','❤️']], count:6,  life:1400, spread:100, dy:-90, anim:'pFloat'},
  excited:  {sets:[['🌟','⚡','💥'],['✨','✦','🌟']],   count:10, life:650,  spread:145, anim:'pSpin'},
  surprised:{sets:[['💥','⚡','❕'],['‼️','✦','💥']],   count:7,  life:500,  spread:100, anim:'pSpin'},
  angry:    {sets:[['💢','🔥','💢'],['❗','💥','🔥']],  count:7,  life:700,  spread:90,  anim:'pFloat'},
  sad:      {sets:[['💧','💧','💧'],['😢','💧','🌧']],  count:5,  life:1600, spread:55,  dy:90,  anim:'pFloat'},
  sleepy:   {sets:[['💤','💤','z'],  ['z','💤','z']],   count:3,  life:2000, spread:45,  dy:-100,anim:'pFloat'},
  wink:     {sets:[['✨','💫','⭐'],['✦','💫','✨']],   count:6,  life:900,  spread:110, anim:'pSpin'},
  dance:    {sets:[['🎵','🎶','✨'],['💃','🎵','⭐']],   count:7,  life:900,  spread:120, anim:'pSpin'},
  cool:     {sets:[['😎','✦','💫'],['⭐','✨','💜']],   count:5,  life:1000, spread:100, anim:'pSpin'},
};

var _pInt = null, _pSet = 0;

function startParticles(expr) {
  clearInterval(_pInt); _pSet = 0;
  document.querySelectorAll('.particle').forEach(function(p){p.remove();});
  var cfg = PARTICLES[expr]; if(!cfg) return;

  function spawn(){
    var stage = document.getElementById('mochi-export'); if(!stage) return;
    var cx = stage.offsetWidth/2, cy = stage.offsetHeight*0.52;
    var chars = cfg.sets[_pSet % cfg.sets.length]; _pSet++;
    for(var i=0;i<cfg.count;i++){
      (function(idx){
        setTimeout(function(){
          var p = document.createElement('div'); p.className='particle';
          p.textContent = chars[Math.floor(Math.random()*chars.length)];
          var angle = (idx/cfg.count)*Math.PI*2 + Math.random()*0.5;
          var sr = 20+Math.random()*35, em = 0.65+Math.random()*0.7;
          var sx = cx+Math.cos(angle)*sr, sy = cy+Math.sin(angle)*sr;
          var tx, ty;
          if(cfg.dy!==undefined){ tx=(Math.random()-0.5)*cfg.spread*0.6; ty=-(cfg.dy*(0.5+Math.random()*0.7)); }
          else{ tx=Math.cos(angle)*cfg.spread*em; ty=Math.sin(angle)*cfg.spread*em-30; }
          p.style.cssText='left:'+sx+'px;top:'+sy+'px;font-size:'+(16+Math.random()*16)+'px;';
          p.style.setProperty('--tx',tx+'px'); p.style.setProperty('--ty',ty+'px');
          p.style.setProperty('--tr',(Math.random()*280-140)+'deg');
          p.style.animation=(cfg.anim||'pFloat')+' '+cfg.life+'ms ease-out forwards';
          stage.appendChild(p);
          setTimeout(function(){if(p.parentNode)p.remove();},cfg.life+150);
        },idx*55);
      })(i);
    }
  }
  spawn(); _pInt = setInterval(spawn, cfg.life*0.6);
}

window.setExpression = function(expr){
  currentExpr = expr;
  var scene = document.getElementById('mochi-export');
  allExprs.forEach(function(e){ if(e) scene.classList.remove('expr-'+e); });
  if(expr) scene.classList.add('expr-'+expr);
  document.querySelectorAll('.expr-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.expr === expr);
  });
  startParticles(expr);
};

/* idle blink */
function idleBlink(){
  if(currentExpr==='sleepy'||currentExpr==='love'||currentExpr==='angry'||currentExpr==='cool') return;
  document.querySelectorAll('.mochi-eye-l,.mochi-eye-r').forEach(function(e){
    e.style.transition='transform .06s'; e.style.transform='scaleY(0.08)';
    setTimeout(function(){ e.style.transform=''; setTimeout(function(){e.style.transition='';},120); },80);
  });
  setTimeout(idleBlink, 3000+Math.random()*2500);
}
setTimeout(idleBlink, 2000);

})();
</script>
</body>
</html>
